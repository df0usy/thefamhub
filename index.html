<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheFamHub</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111d;
            --panel: rgba(18, 28, 42, 0.9);
            --text: #f4f7fb;
            --muted: #9eb0c2;
            --accent: #62c8ff;
            --accent-2: #8df0c8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(98, 200, 255, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(141, 240, 200, 0.12), transparent 28%),
                linear-gradient(180deg, #0b1627 0%, var(--bg) 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2.2rem, 4vw, 3.8rem);
            line-height: 0.95;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        a {
            color: var(--text);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        a:hover {
            transform: translateY(-1px);
            border-color: rgba(98, 200, 255, 0.45);
            background: rgba(98, 200, 255, 0.08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            color: var(--accent-2);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <main>
        <div class="badge">TheFamHub</div>
        <h1>Shared family planning, tasks, calendar, and location.</h1>
        <p>
            TheFamHub helps families coordinate daily life in one private, invite-only space.
            Use the links below for support and privacy information.
        </p>
        <nav>
            <a href="./support.html">Support</a>
            <a href="./privacy-policy.html">Privacy Policy</a>
        </nav>
    </main>
</body>
</html>
